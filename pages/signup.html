<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChronoLux | Register</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/logo-mark.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/favicon-16.png">
  <link rel="icon" type="image/png" sizes="192x192" href="../assets/images/favicon-192.png">
  <link rel="shortcut icon" href="../favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Libre+Baskerville:wght@400;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <link rel="stylesheet" href="../assets/css/portal.css">
</head>

<body class="login-page register-page">
  <a href="#registerContent" class="skip-link">Skip to registration</a>

  <nav class="navbar navbar-expand-lg site-navbar login-navbar" aria-label="Register navigation">
    <div class="container">
      <a class="navbar-brand d-inline-flex align-items-center gap-2" href="index.html">
        <img class="site-logo-mark" width="30" height="30" src="../assets/images/logo-mark.svg" alt="ChronoLux crest">
        <span>Chrono<span>Lux</span></span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#registerNav"
        aria-controls="registerNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="navbar-controls">
        <button id="themeToggle" class="theme-toggle" aria-label="Switch to dark mode" type="button">
          <i class="fas fa-moon" aria-hidden="true"></i>
        </button>
        <button id="rtlToggle" class="rtl-toggle" aria-label="Toggle RTL direction" type="button">
          <i class="fa-solid fa-right-left" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  </nav>

  <main id="registerContent" class="login-shell login-shell--single">
    <section class="login-form-panel" aria-labelledby="registerTitle">
      <div class="login-card register-card">
        <div class="login-card-header text-center">
          <a href="index.html" class="navbar-brand justify-content-center">
            <img class="site-logo-mark" src="../assets/images/logo-mark.svg" width="30" height="30" alt="ChronoLux">
            <span>Chrono<span>Lux</span></span>
          </a>
          <h2 id="registerTitle">Welcome</h2>
          <p>Create your account to get started. You'll be able to log in once your account is created.</p>
        </div>

        <form id="registerForm" class="portal-form login-panel active" novalidate>
          <div class="row g-3">
            <div class="col-md-6">
              <label for="firstName" class="visually-hidden">First name</label>
              <input type="text" class="form-control" id="firstName" placeholder="First name" autocomplete="given-name"
                required>
            </div>
            <div class="col-md-6">
              <label for="lastName" class="visually-hidden">Last name</label>
              <input type="text" class="form-control" id="lastName" placeholder="Last name" autocomplete="family-name"
                required>
            </div>
            <div class="col-md-6">
              <label for="signupEmail" class="visually-hidden">Email address</label>
              <input type="email" class="form-control" id="signupEmail" placeholder="Email address" autocomplete="email"
                required>
            </div>
            <div class="col-md-6">
              <label for="phone" class="visually-hidden">Phone</label>
              <input type="text" class="form-control" id="phone" placeholder="Phone" autocomplete="tel" required>
            </div>
            <div class="col-12">

              <label for="signupPassword" class="visually-hidden">
                Password
              </label>

              <div class="password-wrapper">

                <input type="password" class="form-control" id="signupPassword" placeholder="Password"
                  autocomplete="new-password" required>

                <button type="button" class="password-toggle" aria-label="Toggle password visibility">

                  <i class="fas fa-eye"></i>

                </button>

              </div>

            </div>
            <div class="col-12">

              <label for="confirmPassword" class="visually-hidden">
                Confirm Password
              </label>

              <div class="password-wrapper">

                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password"
                  autocomplete="new-password" required>

                <button type="button" class="password-toggle" aria-label="Toggle password visibility">

                  <i class="fas fa-eye"></i>

                </button>

              </div>

            </div>
          </div>

          <button type="submit" class="btn-gold w-100 mt-4">
            <i class="fa-solid fa-user-plus" aria-hidden="true"></i>Create Account
          </button>

          <div class="auth-divider">Or sign up with</div>

          <div class="social-auth-buttons">
            <button type="button" id="googleSignupBtn" class="btn-social-auth btn-google-auth">
              <i class="fa-brands fa-google" aria-hidden="true"></i>Continue with Google
            </button>
            <button type="button" id="appleSignupBtn" class="btn-social-auth btn-apple-auth">
              <i class="fa-brands fa-apple" aria-hidden="true"></i>Continue with Apple
            </button>
          </div>

          <p class="login-switch-note">Use demo access? <a href="login.html">Sign in</a></p>
          <p class="login-switch-note mt-2"><a href="login.html#admin">Admin access</a></p>
        </form>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/accounts-store.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const firstName = document.querySelector('#firstName').value.trim();
      const lastName = document.querySelector('#lastName').value.trim();
      const email = document.querySelector('#signupEmail').value.trim();
      const phone = document.querySelector('#phone').value.trim();
      const password = document.querySelector('#signupPassword').value.trim();
      const confirmPassword = document.querySelector('#confirmPassword').value.trim();
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!firstName || !lastName || !email || !phone || !password || !confirmPassword) {
        alert('Please fill in all fields');
        return;
      }

      if (!emailPattern.test(email)) {
        alert('Please enter a valid email address');
        return;
      }

      if (password.length < 6) {
        alert('Password must be at least 6 characters');
        return;
      }

      if (password !== confirmPassword) {
        alert('Passwords do not match');
        return;
      }

      const result = window.ChronoluxAccounts.registerAccount({
        firstName: firstName,
        lastName: lastName,
        email: email,
        phone: phone,
        password: password
      });

      if (!result.ok && result.reason === 'exists') {
        alert('An account with that email already exists. Please log in instead.');
        window.location.replace('login.html');
        return;
      }

      if (!result.ok) {
        alert('Something went wrong creating your account. Please try again.');
        return;
      }

      alert('Account created! Please log in with your new email and password.');
      window.location.replace('login.html');
    });

    function socialDemoSignup(provider) {
      [
        'userLoggedIn', 'userEmail', 'userLoggedInEmail', 'userName',
        'adminLoggedIn', 'adminEmail', 'adminLoggedInEmail', 'adminName'
      ].forEach(function (key) {
        localStorage.removeItem(key);
      });

      const demoEmail = 'demo.' + provider + '.user@example.com';
      const demoName = 'Sofia Laurent';

      // Social sign-up creates (or reuses) the account, then logs the
      // user straight in — matching how real Google/Apple sign-up
      // flows work, since the provider itself acts as the verification
      // step in place of a password.
      window.ChronoluxAccounts.upsertSocialAccount(demoEmail, demoName);

      localStorage.setItem('userLoggedIn', 'true');
      localStorage.setItem('userLoggedInEmail', demoEmail);
      localStorage.setItem('userEmail', demoEmail);
      localStorage.setItem('userName', demoName);
      localStorage.setItem('authProvider', provider);

      window.location.replace('user-dashboard.html');
    }

    const googleSignupBtn = document.getElementById('googleSignupBtn');
    const appleSignupBtn = document.getElementById('appleSignupBtn');

    if (googleSignupBtn) {
      googleSignupBtn.addEventListener('click', function () {
        socialDemoSignup('google');
      });
    }

    if (appleSignupBtn) {
      appleSignupBtn.addEventListener('click', function () {
        socialDemoSignup('apple');
      });
    }
  </script>
</body>

</html>
