<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChronoLux | Login</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/logo-mark.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/favicon-16.png">
  <link rel="icon" type="image/png" sizes="192x192" href="../assets/images/favicon-192.png">
  <link rel="shortcut icon" href="../favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Libre+Baskerville:wght@400;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <link rel="stylesheet" href="../assets/css/portal.css">
</head>

<body class="login-page">
  <a href="#loginContent" class="skip-link">Skip to login</a>

  <nav class="navbar navbar-expand-lg site-navbar login-navbar" aria-label="Login navigation">
    <div class="container">
      <a class="navbar-brand d-inline-flex align-items-center gap-2" href="index.html">
        <img class="site-logo-mark" width="30" height="30" src="../assets/images/logo-mark.svg" alt="ChronoLux crest">
        <span>Chrono<span>Lux</span></span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#loginNav"
        aria-controls="loginNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="navbar-controls">
        <button id="themeToggle" class="theme-toggle" aria-label="Switch to dark mode" type="button">
          <i class="fas fa-moon" aria-hidden="true"></i>
        </button>
        <button id="rtlToggle" class="rtl-toggle" aria-label="Toggle RTL direction" type="button">
          <i class="fa-solid fa-right-left" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  </nav>

  <main id="loginContent" class="login-shell login-shell--single">
    <section class="login-form-panel" aria-labelledby="loginTitle">
      <div class="login-card">
        <div class="login-card-header text-center">
          <a class="navbar-brand d-inline-flex align-items-center gap-2" href="index.html">
            <img class="site-logo-mark" width="30" height="30" src="../assets/images/logo-mark.svg"
              alt="ChronoLux crest">
            <span>Chrono<span>Lux</span></span>
          </a>
          <h2 id="loginTitle">Welcome back</h2>
          <p id="loginHelp">Sign in to continue to your ChronoLux account.</p>
        </div>

        <div class="login-tabs" role="tablist" aria-label="Choose login type">
          <button class="login-tab active" id="customerTab" type="button" role="tab" aria-controls="customerLogin"
            aria-selected="true" data-login-tab="customer">
            <i class="fa-solid fa-user" aria-hidden="true"></i>Customer
          </button>
          <button class="login-tab" id="adminTab" type="button" role="tab" aria-controls="adminLogin"
            aria-selected="false" data-login-tab="admin">
            <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>Admin
          </button>
        </div>

        <form id="customerLogin" class="portal-form login-panel active" role="tabpanel" aria-labelledby="customerTab"
          novalidate>
          <div class="mb-3">
            <label for="customerEmail" class="visually-hidden">Email address</label>
            <input type="email" class="form-control" id="customerEmail" placeholder="Email address" autocomplete="email"
              required>
          </div>
          <div class="mb-3">
            <label for="customerPassword" class="visually-hidden">Password</label>

            <div class="password-wrapper">

              <input type="password" class="form-control" id="customerPassword" placeholder="Password"
                autocomplete="current-password" required>

              <button type="button" class="password-toggle" aria-label="Toggle password visibility">

                <i class="fas fa-eye"></i>

              </button>

            </div>
          </div>
          <div class="login-options">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="customerRemember">
              <label class="form-check-label" for="customerRemember">Remember me</label>
            </div>
            <a href="#">Forgot Password?</a>
          </div>
          <button type="submit" class="btn-gold w-100">
            <i class="fa-solid fa-right-to-bracket" aria-hidden="true"></i>Login
          </button>

          <div class="auth-divider">Or continue with</div>

          <div class="social-auth-buttons">
            <button type="button" id="googleLoginBtn" class="btn-social-auth btn-google-auth">
              <i class="fa-brands fa-google" aria-hidden="true"></i>Continue with Google
            </button>
            <button type="button" id="appleLoginBtn" class="btn-social-auth btn-apple-auth">
              <i class="fa-brands fa-apple" aria-hidden="true"></i>Continue with Apple
            </button>
          </div>

          <p class="login-switch-note">New here? <a href="signup.html">Create an account</a></p>
        </form>

        <form id="adminLogin" class="portal-form login-panel" role="tabpanel" aria-labelledby="adminTab" novalidate
          hidden>
          <div class="mb-3">
            <label for="adminEmail" class="visually-hidden">Admin email address</label>
            <input type="email" class="form-control" id="adminEmail" placeholder="Admin email address"
              autocomplete="email" required>
          </div>
          <div class="mb-3">
            <label for="adminPassword" class="visually-hidden">Admin password</label>

            <div class="password-wrapper">

              <input type="password" class="form-control" id="adminPassword" placeholder="Password"
                autocomplete="current-password" required>

              <button type="button" class="password-toggle" aria-label="Toggle password visibility">

                <i class="fas fa-eye"></i>

              </button>

            </div>
          </div>
          <div class="login-options">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="adminRemember">
              <label class="form-check-label" for="adminRemember">Remember me</label>
            </div>
            <a href="#">Forgot Password?</a>
          </div>
          <button type="submit" class="btn-gold w-100">
            <i class="fa-solid fa-user-shield" aria-hidden="true"></i>Admin Login
          </button>

          <p class="login-switch-note">New staff member? <a href="admin-signup.html">Create an admin account</a></p>
        </form>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/accounts-store.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    (function () {
      // NOTE: This template ships without a backend, so there is no real
      // authentication server to check credentials against. Customer
      // credentials are instead checked against accounts created on the
      // sign-up page (see assets/js/accounts-store.js) — you can only log
      // in as a customer after registering first. The admin tab still uses
      // a demo bypass since admin accounts are provisioned by staff, not
      // self-registered; before going live, replace both with real calls
      // to your authentication API (e.g. POST /api/login) and stop
      // trusting localStorage as a session store.
      const demoAccounts = {
        customer: {
          name: 'Sofia Laurent',
          storageKey: 'userLoggedIn',
          redirectUrl: 'user-dashboard.html'
        },
        admin: {
          name: 'Operations Director',
          storageKey: 'adminLoggedIn',
          redirectUrl: 'admin-dashboard.html'
        }
      };

      const tabs = document.querySelectorAll('[data-login-tab]');
      const panels = {
        customer: document.getElementById('customerLogin'),
        admin: document.getElementById('adminLogin')
      };

      function activateTab(target) {
        tabs.forEach(function (tab) {
          const isActive = tab.getAttribute('data-login-tab') === target;
          tab.classList.toggle('active', isActive);
          tab.setAttribute('aria-selected', String(isActive));
        });

        Object.keys(panels).forEach(function (key) {
          const panel = panels[key];
          const isActive = key === target;
          panel.classList.toggle('active', isActive);
          panel.hidden = !isActive;
        });
      }

      tabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          activateTab(tab.getAttribute('data-login-tab'));
        });
      });

      if (window.location.hash === '#admin') {
        activateTab('admin');
      }

      function clearAuthState() {
        [
          'userLoggedIn',
          'userEmail',
          'userLoggedInEmail',
          'userName',
          'adminLoggedIn',
          'adminEmail',
          'adminLoggedInEmail',
          'adminName'
        ].forEach(function (key) {
          localStorage.removeItem(key);
        });
      }

      function completeLogin(accountType, account, email, displayName) {
        clearAuthState();
        localStorage.setItem(account.storageKey, 'true');
        localStorage.setItem(account.storageKey + 'Email', email);

        if (accountType === 'customer') {
          localStorage.setItem('userEmail', email);
          localStorage.setItem('userName', displayName || account.name);
        } else {
          localStorage.setItem('adminEmail', email);
          localStorage.setItem('adminName', displayName || account.name);
        }

        const returnTo = sessionStorage.getItem('loginReturnTo');
        if (accountType === 'customer' && (returnTo === 'booking.html' || document.referrer.includes('booking.html'))) {
          sessionStorage.removeItem('loginReturnTo');
          window.location.replace('booking.html');
          return;
        }

        sessionStorage.removeItem('loginReturnTo');
        window.location.replace(account.redirectUrl);
      }

      // Customer login: only succeeds for accounts created on signup.html.
      panels.customer.addEventListener('submit', function (event) {
        event.preventDefault();

        const email = panels.customer.querySelector('#customerEmail').value.trim();
        const password = panels.customer.querySelector('#customerPassword').value.trim();

        if (!email || !password) {
          alert('Please fill in all fields');
          return;
        }

        const result = window.ChronoluxAccounts.verifyAccount(email, password);

        if (!result.ok && result.reason === 'not-found') {
          alert('No account found with that email. Please create an account first.');
          window.location.href = 'signup.html';
          return;
        }

        if (!result.ok) {
          alert('Incorrect password. Please try again.');
          return;
        }

        completeLogin('customer', demoAccounts.customer, email, result.account.name);
      });

      // Admin login: verified against admin accounts created on
      // admin-signup.html (see assets/js/accounts-store.js), the same
      // pattern used for customer login below.
      panels.admin.addEventListener('submit', function (event) {
        event.preventDefault();

        const email = panels.admin.querySelector('#adminEmail').value.trim();
        const password = panels.admin.querySelector('#adminPassword').value.trim();

        if (!email || !password) {
          alert('Please fill in all fields');
          return;
        }

        const result = window.ChronoluxAccounts.verifyAdminAccount(email, password);

        if (!result.ok && result.reason === 'not-found') {
          alert('No admin account found with that email. Please create one first.');
          window.location.href = 'admin-signup.html';
          return;
        }

        if (!result.ok) {
          alert('Incorrect password. Please try again.');
          return;
        }

        completeLogin('admin', demoAccounts.admin, email, result.account.name);
      });

      function socialDemoLogin(provider) {
        const account = demoAccounts.customer;
        const demoEmail = 'demo.' + provider + '.user@example.com';

        // Real "Sign in with Google/Apple" also creates the account on
        // first use, with the provider standing in for a password — so
        // this mirrors that instead of requiring a separate signup step.
        const record = window.ChronoluxAccounts.upsertSocialAccount(demoEmail, account.name);

        localStorage.setItem('authProvider', provider);
        completeLogin('customer', account, demoEmail, record.name);
      }

      const googleLoginBtn = document.getElementById('googleLoginBtn');
      const appleLoginBtn = document.getElementById('appleLoginBtn');

      if (googleLoginBtn) {
        googleLoginBtn.addEventListener('click', function () {
          socialDemoLogin('google');
        });
      }

      if (appleLoginBtn) {
        appleLoginBtn.addEventListener('click', function () {
          socialDemoLogin('apple');
        });
      }
    })();
  </script>
</body>

</html>
